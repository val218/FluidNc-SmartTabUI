name: Build Fluidnc-SmartTabUI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: pio run -e cyddial && pio run -e cyddial -t buildfs && pio run -e cyddial -t build_merged

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: Fluidnc-SmartTabUI
          path: .pio/build/cyddial/*.bin

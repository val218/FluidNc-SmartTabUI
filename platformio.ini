; PlatformIO Project Configuration — dpcreator.eu TabUI for JC2432W328C

[platformio]
default_envs = tabui

[common]
build_flags =
    !python ./git-version.py
    -DJSP_USE_CHARP
    -DE4_POS_T
    -DVERBATIM_GCODE_MODES
lib_deps =
    https://github.com/MitchBradley/json-streaming-parser#charp-1.0.2
    https://github.com/MitchBradley/GrblParser#9108f54
build_src_filter = +<*.c> +<*.h> +<*.cpp> +<*.hpp> -<System*.cpp> -<Hardware*.cpp> +<System.cpp> -<Touch_Class.cpp>

[env:cyd_base]
platform = espressif32
board = esp32dev
framework = arduino
platform_packages =
    platformio/framework-arduinoespressif32@^3.20016.0
monitor_filters = esp32_exception_decoder
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
upload_flags = --no-stub
lib_deps =
    ${common.lib_deps}
    LovyanGFX=https://github.com/lovyan03/LovyanGFX#develop
build_flags =
    ${common.build_flags}
    -DUSE_LOVYANGFX
    -DFNC_BAUD=1000000
    -DCYD_BUTTONS
custom_filesystem_start = 0x290000
extra_scripts = ./build_merged.py
build_src_filter = ${common.build_src_filter} +<SystemArduino.cpp> +<Hardware2432.cpp> +<Touch_Class.cpp>

[env:cyd_nodebug]
extends = env:cyd_base
build_flags =
    ${env:cyd_base.build_flags}
    -DCAPACITIVE_CYD

; ── Tab UI build for JC2432W328C (capacitive touch) ─────────────────────────
[env:tabui]
extends = env:cyd_nodebug
build_flags =
    ${env:cyd_nodebug.build_flags}
    -DCYD_BUTTONS
